name: Publicar en GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Pages
        uses: actions/configure-pages@v5

      - name: Subir carpeta public/ como artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
